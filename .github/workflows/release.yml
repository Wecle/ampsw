name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - run: bun test
      - run: bun run build
      - run: bun run lint:types
      - run: bun run scripts/release/assert-release-version.ts "${GITHUB_REF_NAME}"
      - id: package_version
        run: |
          echo "value=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
      - run: bun run scripts/release/build-binaries.ts
      - run: bun run scripts/release/create-checksums.ts
      - run: mkdir -p dist/homebrew && bun run scripts/release/render-homebrew-formula.ts > dist/homebrew/ampsw.rb
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_DIR="dist/releases/${{ steps.package_version.outputs.value }}"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "${ASSET_DIR}/ampsw-darwin-arm64.tar.gz" \
              "${ASSET_DIR}/ampsw-darwin-x64.tar.gz" \
              "${ASSET_DIR}/ampsw-linux-arm64.tar.gz" \
              "${ASSET_DIR}/ampsw-linux-x64.tar.gz" \
              "${ASSET_DIR}/SHA256SUMS" \
              "dist/homebrew/ampsw.rb" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${ASSET_DIR}/ampsw-darwin-arm64.tar.gz" \
              "${ASSET_DIR}/ampsw-darwin-x64.tar.gz" \
              "${ASSET_DIR}/ampsw-linux-arm64.tar.gz" \
              "${ASSET_DIR}/ampsw-linux-x64.tar.gz" \
              "${ASSET_DIR}/SHA256SUMS" \
              "dist/homebrew/ampsw.rb" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
      - if: ${{ env.NPM_TOKEN != '' }}
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION_LOCAL="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION_LOCAL}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION_LOCAL} is already published"
          else
            npm publish --access public
          fi
      - if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
          AMPSW_HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
        run: bash scripts/release/update-homebrew-tap.sh dist/homebrew/ampsw.rb "${{ steps.package_version.outputs.value }}"
