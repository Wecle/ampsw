name: CI

on:
  push:
    branches:
      - main
      - codex-ampsw-bun-cli
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - run: bun install
      - run: bun test
      - run: bun run build
      - run: bun run lint:types
